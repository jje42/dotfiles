[[mgr.prepend_keymap]]
on = "!"
run = 'shell "$SHELL" --block'
desc = "Open shell here"

[[mgr.prepend_keymap]]
on = "T"
run = "plugin toggle-pane max-preview"
desc = "Maximise or restore the preview pane"

[[mgr.prepend_keymap]]
on = [ "g", "g" ]
run = 'shell --block lazygit'
desc = "Open lazygit"
